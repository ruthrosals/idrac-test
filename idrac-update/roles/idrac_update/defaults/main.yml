---
# Approved component baseline for safe enterprise updates.
# Legacy single-component variables remain supported for iDRAC only.

idrac_update_mode: "check"

idrac_update_approved_components:
  - idrac_lifecycle_controller
  - uefi_diagnostics
  - os_driver_pack

idrac_update_disallowed_components:
  - bios
  - perc
  - nic
  - disk_firmware
  - cpld

idrac_update_supported_transfer_protocols:
  - HTTP
  - HTTPS

idrac_update_allow_duplicate_components: false

idrac_update_items: []

idrac_update_serial: 1
idrac_update_port: 443
idrac_update_validate_certs: false
idrac_update_force_basic_auth: true
idrac_update_no_log: true
idrac_update_validate_image_uri: true
idrac_update_image_uri_timeout: 30
idrac_update_image_uri_status_codes:
  - 200

idrac_update_component_handlers:
  idrac_lifecycle_controller:
    aliases:
      - idrac
      - integrated dell remote access controller
      - lifecycle controller
      - idrac with lifecycle controller
      - idrac_lifecycle_controller
    comparator: dotted_numeric
    installer: redfish
    restart_redfish: true
    execution_order: 30
    inventory_match:
      names:
        - integrated dell remote access controller
        - lifecycle controller
      primary_source: manager_firmware_version
    supports_downgrade: true
    install_when_absent_default: false
  uefi_diagnostics:
    aliases:
      - diagnostics
      - uefi diagnostics
      - dell 64 bit uefi diagnostics
      - 64 bit uefi diagnostics
      - uefi_diagnostics
    comparator: uefi_revision
    installer: redfish
    restart_redfish: false
    execution_order: 10
    inventory_match:
      names:
        - dell 64 bit uefi diagnostics
        - 64 bit uefi diagnostics
      primary_source: firmware_inventory
    supports_downgrade: true
    install_when_absent_default: false
  os_driver_pack:
    aliases:
      - os driver pack
      - dell os driver pack
      - drivers for os deployment
      - os_driver_pack
    comparator: dotted_numeric
    installer: redfish
    restart_redfish: false
    execution_order: 20
    inventory_match:
      names:
        - dell os driver pack
        - os driver pack
        - drivers for os deployment
      primary_source: firmware_inventory
    supports_downgrade: true
    install_when_absent_default: false
idrac_update_post_idrac_stabilization_delay: 30
idrac_update_firmware_submit_retries: 3
idrac_update_firmware_submit_retry_delay: 20
idrac_update_lc_busy_retries: 20
idrac_update_lc_busy_delay: 30
idrac_update_lc_idle_stabilization_delay: 20
idrac_update_lifecycle_controller_busy_retries: "{{ idrac_update_lc_busy_retries }}"
idrac_update_lifecycle_controller_busy_retry_delay: "{{ idrac_update_lc_busy_delay }}"
idrac_update_redfish_recovery_retries: 60
idrac_update_redfish_recovery_delay: 10

idrac_update_user: "{{ lookup('env', 'IDRAC_USERNAME') }}"
idrac_update_password: "{{ lookup('env', 'IDRAC_PASSWORD') }}"

idrac_update_report_enabled: true
idrac_update_report_dir: "/var/tmp/idrac-update-reports/updates"
idrac_update_report_latest_dir: "{{ idrac_update_report_dir }}/latest"
idrac_update_report_archive_enabled: true
idrac_report_run_id: ""  # noqa: var-naming[no-role-prefix]
idrac_update_report_run_id: "{{ idrac_report_run_id }}"
idrac_update_report_timestamp: "{{ idrac_report_run_id }}"
idrac_update_report_archive_dir: "{{ idrac_update_report_dir }}/archive/{{ idrac_report_run_id }}"
idrac_update_report_archive_retention: 3

idrac_report_upload_enabled: false  # noqa: var-naming[no-role-prefix]
idrac_report_upload_provider: "wasabi"  # noqa: var-naming[no-role-prefix]
idrac_report_bucket: ""  # noqa: var-naming[no-role-prefix]
idrac_report_prefix: "reports"  # noqa: var-naming[no-role-prefix]
idrac_report_s3_endpoint_url: ""  # noqa: var-naming[no-role-prefix]
idrac_report_s3_profile: "wasabi"  # noqa: var-naming[no-role-prefix]
idrac_report_s3_cli_path: "aws"  # noqa: var-naming[no-role-prefix]
