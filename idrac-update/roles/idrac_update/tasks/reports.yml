---
- name: Final report
  ansible.builtin.debug:
    msg:
      host: "{{ inventory_hostname }}"
      mode: "{{ idrac_update_mode }}"
      power_state_before: "{{ idrac_update_power_state_before }}"
      sel_critical_before: "{{ idrac_update_sel_critical_count_before }}"
      sel_critical_after: "{{ idrac_update_sel_critical_count_after | default('not_checked') }}"
      compliance: "{{ idrac_update_compliance_report }}"
      final_versions: "{{ idrac_update_firmware_versions_after | default(idrac_update_firmware_versions | default({})) }}"
      firmware_verification: "{{ idrac_update_final_report }}"

- name: Final execution summary
  ansible.builtin.debug:
    msg:
      host: "{{ inventory_hostname }}"
      sel_critical_delta: >-
        {{
          (idrac_update_sel_critical_count_after | default(idrac_update_sel_critical_count_before) | int)
          - (idrac_update_sel_critical_count_before | int)
        }}
      report_upload_result: >-
        {{
          'enabled'
          if idrac_report_upload_enabled | default(false) | bool
          else 'not_enabled'
        }}
      components: >-
        {{
          idrac_update_final_report
          | map(attribute='component')
          | list
        }}
      summary: "{{ idrac_update_final_report }}"

- name: Report | Build update report entry
  ansible.builtin.set_fact:
    idrac_update_report_entry:
      inventory_hostname: "{{ inventory_hostname }}"
      idrac_ip: "{{ idrac_ip }}"
      mode: "{{ idrac_update_mode }}"
      power_state_before: "{{ idrac_update_power_state_before }}"
      sel_critical_before: "{{ idrac_update_sel_critical_count_before }}"
      sel_critical_after: "{{ idrac_update_sel_critical_count_after | default('not_checked') }}"
      compliance: "{{ idrac_update_compliance_report }}"
      final_versions: "{{ idrac_update_firmware_versions_after | default(idrac_update_firmware_versions | default({})) }}"
      firmware_verification: "{{ idrac_update_final_report }}"
      install_results: "{{ idrac_update_install_results | default([]) }}"
      report_status: "complete"
  when: idrac_update_report_enabled | bool

- name: Report | Set update report run ID  # noqa: run-once[task] var-naming[no-role-prefix]
  ansible.builtin.set_fact:
    idrac_report_run_id: "{{ lookup('pipe', 'date +%Y%m%d-%H%M%S') }}"
  delegate_to: localhost
  delegate_facts: true
  run_once: true
  when: idrac_update_report_enabled | bool

- name: Report | Set update publication directories  # noqa: run-once[task]
  ansible.builtin.set_fact:
    idrac_update_report_staging_dir: >-
      {{ idrac_update_report_dir }}/staging/{{ hostvars.localhost.idrac_report_run_id }}
    idrac_update_report_archive_dir: >-
      {{ idrac_update_report_dir }}/archive/{{ hostvars.localhost.idrac_report_run_id }}
  delegate_to: localhost
  delegate_facts: true
  run_once: true
  when: idrac_update_report_enabled | bool

- name: Report | Reset update staging directory  # noqa: run-once[task]
  ansible.builtin.file:
    path: "{{ hostvars.localhost.idrac_update_report_staging_dir }}"
    state: absent
  delegate_to: localhost
  run_once: true
  when: idrac_update_report_enabled | bool

- name: Report | Create update staging directory  # noqa: run-once[task] risky-file-permissions
  ansible.builtin.file:
    path: "{{ hostvars.localhost.idrac_update_report_staging_dir }}"
    state: directory
    mode: "0775"
  delegate_to: localhost
  run_once: true
  when: idrac_update_report_enabled | bool

- name: Report | Reset consolidated update report data  # noqa: run-once[task]
  ansible.builtin.set_fact:
    idrac_update_summary_hosts: []
    idrac_update_csv_rows: []
  delegate_to: localhost
  delegate_facts: true
  run_once: true
  when: idrac_update_report_enabled | bool

- name: Report | Build consolidated update report data  # noqa: run-once[task]
  ansible.builtin.set_fact:
    idrac_update_summary_hosts: "{{ idrac_update_summary_hosts | default([]) + [hostvars[item].idrac_update_report_entry] }}"
  loop: "{{ ansible_play_hosts_all }}"
  delegate_to: localhost
  delegate_facts: true
  run_once: true
  when:
    - idrac_update_report_enabled | bool
    - hostvars[item].idrac_update_report_entry is defined

- name: Report | Build update CSV rows  # noqa: run-once[task]
  ansible.builtin.set_fact:
    idrac_update_csv_rows: "{{ idrac_update_csv_rows | default([]) + [idrac_update_csv_row] }}"
  loop: "{{ hostvars.localhost.idrac_update_summary_hosts | default([]) | subelements('firmware_verification', skip_missing=true) }}"
  loop_control:
    label: "{{ item.0.inventory_hostname }} {{ item.1.name }}"
  delegate_to: localhost
  delegate_facts: true
  run_once: true
  vars:
    idrac_update_csv_row:
      inventory_hostname: "{{ item.0.inventory_hostname }}"
      idrac_ip: "{{ item.0.idrac_ip }}"
      mode: "{{ item.0.mode }}"
      component: "{{ item.1.component }}"
      component_name: "{{ item.1.name }}"
      current_version: "{{ item.1.current_version }}"
      target_version: "{{ item.1.target_version }}"
      expected_installed_version: "{{ item.1.expected_installed_version }}"
      handler_comparator: "{{ item.1.handler_comparator }}"
      handler_installer: "{{ item.1.handler_installer }}"
      handler_restart_redfish: "{{ item.1.handler_restart_redfish }}"
      handler_execution_order: "{{ item.1.handler_execution_order }}"
      inventory_source: "{{ item.1.inventory_source }}"
      applicability: "{{ item.1.applicability }}"
      approved: "{{ item.1.approved }}"
      excluded: "{{ item.1.excluded }}"
      allow_downgrade: "{{ item.1.allow_downgrade }}"
      action: "{{ item.1.action }}"
      final_version: "{{ item.1.final_version }}"
      changed: "{{ item.1.changed }}"
      skipped: "{{ item.1.skipped }}"
      verification_status: "{{ item.1.verification_status }}"
      verification_passed: "{{ item.1.verification_passed }}"
  when: idrac_update_report_enabled | bool

- name: Report | Set expected update report files  # noqa: run-once[task]
  ansible.builtin.set_fact:
    idrac_update_expected_report_files: >-
      {{
        [
          'idrac_update_summary.json',
          'idrac_update_summary.csv'
        ]
        + (ansible_play_hosts_all | map('regex_replace', '$', '.json') | list)
      }}
  delegate_to: localhost
  delegate_facts: true
  run_once: true
  when: idrac_update_report_enabled | bool

- name: Report | Export staged per-host update JSON  # noqa: run-once[task]
  ansible.builtin.copy:
    content: "{{ hostvars[item].idrac_update_report_entry | to_nice_json }}"
    dest: "{{ hostvars.localhost.idrac_update_report_staging_dir }}/{{ item }}.json"
    mode: "0644"
    force: true
  loop: "{{ ansible_play_hosts_all }}"
  delegate_to: localhost
  run_once: true
  when:
    - idrac_update_report_enabled | bool
    - hostvars[item].idrac_update_report_entry is defined

- name: Report | Verify staged update host JSON exists  # noqa: run-once[task]
  ansible.builtin.stat:
    path: "{{ hostvars.localhost.idrac_update_report_staging_dir }}/{{ item }}.json"
  loop: "{{ ansible_play_hosts_all }}"
  register: idrac_update_staged_host_file_stats
  delegate_to: localhost
  run_once: true
  when: idrac_update_report_enabled | bool

- name: Report | Fail if staged update host JSON is incomplete  # noqa: run-once[task]
  ansible.builtin.assert:
    that:
      - idrac_update_staged_host_file_stats.results | selectattr('stat.exists', 'equalto', false) | list | length == 0
    fail_msg: >-
      Update report staging is incomplete because one or more current-run host JSON files are missing.
  delegate_to: localhost
  run_once: true
  when: idrac_update_report_enabled | bool

- name: Report | Export staged update summary JSON  # noqa: run-once[task]
  ansible.builtin.copy:
    content: >-
      {{
        {
          'generated_at': now(utc=true).isoformat(),
          'run_id': hostvars.localhost.idrac_report_run_id,
          'hosts': hostvars.localhost.idrac_update_summary_hosts | default([])
        }
        | to_nice_json
      }}
    dest: "{{ hostvars.localhost.idrac_update_report_staging_dir }}/idrac_update_summary.json"
    mode: "0644"
    force: true
  delegate_to: localhost
  run_once: true
  when: idrac_update_report_enabled | bool

- name: Report | Export staged update summary CSV  # noqa: run-once[task]
  ansible.builtin.copy:
    content: |
      inventory_hostname,idrac_ip,mode,component,component_name,current_version,target_version,expected_installed_version,handler_comparator,handler_installer,handler_restart_redfish,handler_execution_order,inventory_source,applicability,approved,excluded,allow_downgrade,action,final_version,changed,skipped,verification_status,verification_passed
      {% for row in hostvars.localhost.idrac_update_csv_rows | default([]) %}
      {{
        [
          row.inventory_hostname,
          row.idrac_ip,
          row.mode,
          row.component,
          row.component_name,
          row.current_version,
          row.target_version,
          row.expected_installed_version,
          row.handler_comparator,
          row.handler_installer,
          row.handler_restart_redfish,
          row.handler_execution_order,
          row.inventory_source,
          row.applicability,
          row.approved,
          row.excluded,
          row.allow_downgrade,
          row.action,
          row.final_version,
          row.changed,
          row.skipped,
          row.verification_status,
          row.verification_passed
        ] | map('to_json') | join(',')
      }}
      {% endfor %}
    dest: "{{ hostvars.localhost.idrac_update_report_staging_dir }}/idrac_update_summary.csv"
    mode: "0644"
    force: true
  delegate_to: localhost
  run_once: true
  when: idrac_update_report_enabled | bool

- name: Report | Find staged update report files  # noqa: run-once[task]
  ansible.builtin.find:
    paths: "{{ hostvars.localhost.idrac_update_report_staging_dir }}"
    file_type: file
    recurse: false
  register: idrac_update_staged_report_files
  delegate_to: localhost
  run_once: true
  when: idrac_update_report_enabled | bool

- name: Report | Validate complete staged update report set  # noqa: run-once[task]
  ansible.builtin.assert:
    that:
      - >-
        idrac_update_staged_report_files.files
        | map(attribute='path')
        | map('basename')
        | sort
        | list
        == hostvars.localhost.idrac_update_expected_report_files | sort
    fail_msg: >-
      Update report staging does not exactly match the expected current-run report file set.
  delegate_to: localhost
  run_once: true
  when: idrac_update_report_enabled | bool

- name: Report | Show update report staging location  # noqa: run-once[task]
  ansible.builtin.debug:
    msg:
      reports_staged_to: "{{ hostvars.localhost.idrac_update_report_staging_dir }}"
      reports_publish_to: "{{ idrac_update_report_latest_dir }}"
  run_once: true
  when: idrac_update_report_enabled | bool
