---
- name: Apply item | Extract returned firmware job reference
  ansible.builtin.set_fact:
    idrac_update_returned_job_id: >-
      {{
        (idrac_update_firmware_submit_result.task | default({})).id
        | default((idrac_update_firmware_submit_result.task | default({})).Id
        | default(''))
      }}
    idrac_update_returned_job_uri_raw: >-
      {{
        (idrac_update_firmware_submit_result.task | default({})).uri
        | default((idrac_update_firmware_submit_result.task | default({}))['@odata.id']
        | default(''))
      }}
    idrac_update_firmware_item_module_message: >-
      {{ idrac_update_firmware_submit_result.msg | default('') }}
  when:
    - idrac_update_firmware_submit_result is defined
    - idrac_update_firmware_submit_result.skipped is not defined

- name: Apply item | Resolve returned firmware job ID
  ansible.builtin.set_fact:
    idrac_update_returned_job_id: >-
      {{
        idrac_update_returned_job_id
        if idrac_update_returned_job_id | length > 0
        else idrac_update_returned_job_uri_raw | regex_search('JID_[A-Za-z0-9_]+') | default('')
      }}
  when:
    - idrac_update_firmware_submit_result is defined
    - idrac_update_firmware_submit_result.skipped is not defined

- name: Apply item | Resolve returned firmware job URIs
  ansible.builtin.set_fact:
    idrac_update_returned_jobservice_uri: >-
      {{
        idrac_update_returned_job_uri_raw
        if idrac_update_returned_job_uri_raw is match('^/redfish/')
        else (
          '/redfish/v1/' ~ (idrac_update_returned_job_uri_raw | regex_replace('^/+', ''))
          if idrac_update_returned_job_uri_raw | length > 0
          else (
            '/redfish/v1/JobService/Jobs/' ~ idrac_update_returned_job_id
            if idrac_update_returned_job_id | length > 0
            else ''
          )
        )
      }}
    idrac_update_returned_dell_job_uri: >-
      {{
        '/redfish/v1/Managers/iDRAC.Embedded.1/Oem/Dell/Jobs/' ~ idrac_update_returned_job_id
        if idrac_update_returned_job_id | length > 0
        else ''
      }}
  when:
    - idrac_update_firmware_submit_result is defined
    - idrac_update_firmware_submit_result.skipped is not defined

- name: Apply item | Query returned JobService job
  ansible.builtin.uri:
    url: "https://{{ idrac_ip }}:{{ idrac_update_port }}{{ idrac_update_returned_jobservice_uri }}"
    method: GET
    url_username: "{{ idrac_update_user }}"
    url_password: "{{ idrac_update_password }}"
    force_basic_auth: "{{ idrac_update_force_basic_auth }}"
    validate_certs: "{{ idrac_update_validate_certs }}"
    status_code: [200, 404]
    timeout: 30
  register: idrac_update_returned_jobservice_result
  failed_when: false
  no_log: "{{ idrac_update_no_log }}"
  when:
    - idrac_update_returned_jobservice_uri | default('') | length > 0

- name: Apply item | Query returned Dell job fallback
  ansible.builtin.uri:
    url: "https://{{ idrac_ip }}:{{ idrac_update_port }}{{ idrac_update_returned_dell_job_uri }}"
    method: GET
    url_username: "{{ idrac_update_user }}"
    url_password: "{{ idrac_update_password }}"
    force_basic_auth: "{{ idrac_update_force_basic_auth }}"
    validate_certs: "{{ idrac_update_validate_certs }}"
    status_code: [200, 404]
    timeout: 30
  register: idrac_update_returned_dell_job_result
  failed_when: false
  no_log: "{{ idrac_update_no_log }}"
  when:
    - idrac_update_returned_dell_job_uri | default('') | length > 0
    - >-
      idrac_update_returned_jobservice_result.json is not defined
      or idrac_update_returned_jobservice_result.status | default(0) != 200

- name: Apply item | Capture returned Dell job details
  ansible.builtin.set_fact:
    idrac_update_returned_job_detail: >-
      {{
        idrac_update_returned_jobservice_result.json
        if idrac_update_returned_jobservice_result.json is defined
        and idrac_update_returned_jobservice_result.status | default(0) == 200
        else idrac_update_returned_dell_job_result.json | default({})
      }}
  when:
    - idrac_update_firmware_submit_result is defined
    - idrac_update_firmware_submit_result.skipped is not defined

- name: Apply item | Capture returned Dell job identifiers
  ansible.builtin.set_fact:
    idrac_update_firmware_item_job_id: >-
      {{
        idrac_update_returned_job_id
        | default((idrac_update_returned_job_detail | default({})).Id | default(idrac_update_firmware_item_job_id), true)
      }}
    idrac_update_firmware_item_job_uri: >-
      {{
        idrac_update_returned_jobservice_uri
        if idrac_update_returned_jobservice_uri | default('') | length > 0
        else idrac_update_returned_dell_job_uri | default('')
      }}
  when:
    - idrac_update_firmware_submit_result is defined
    - idrac_update_firmware_submit_result.skipped is not defined

- name: Apply item | Capture returned Dell job fields
  ansible.builtin.set_fact:
    idrac_update_firmware_item_dell_message_id: >-
      {{
        idrac_update_returned_job_detail.MessageId
        | default(idrac_update_returned_job_detail.Messages[0].MessageId | default(''))
        | default('')
      }}
    idrac_update_firmware_item_dell_message: >-
      {{
        idrac_update_returned_job_detail.Message
        | default(idrac_update_returned_job_detail.Messages[0].Message | default(''))
        | default(idrac_update_firmware_submit_result.msg | default(''))
      }}
    idrac_update_firmware_item_job_state: >-
      {{ idrac_update_returned_job_detail.JobState | default(idrac_update_returned_job_detail.JobStatus | default('')) }}
    idrac_update_firmware_item_percent_complete: >-
      {{ idrac_update_returned_job_detail.PercentComplete | default('') }}
  when:
    - idrac_update_firmware_submit_result is defined
    - idrac_update_firmware_submit_result.skipped is not defined

- name: Apply item | Build firmware submission classification text
  ansible.builtin.set_fact:
    idrac_update_submit_error_text: >-
      {{
        [
          idrac_update_firmware_item_module_message | default(''),
          idrac_update_firmware_item_dell_message_id | default(''),
          idrac_update_firmware_item_dell_message | default(''),
          idrac_update_firmware_item_job_state | default('')
        ] | join(' ') | lower
      }}
  when:
    - idrac_update_firmware_submit_result is defined
    - idrac_update_firmware_submit_result.skipped is not defined

- name: Apply item | Classify firmware submission result from Dell job details
  ansible.builtin.set_fact:
    idrac_update_submit_error_is_red023: >-
      {{
        'red023' in ([
          idrac_update_firmware_item_dell_message_id | default(''),
          idrac_update_firmware_item_dell_message | default('')
        ] | join(' ') | lower)
        or 'lifecycle controller in use' in (idrac_update_firmware_item_dell_message | default('') | lower)
        or 'lifecycle controller is available' in (idrac_update_firmware_item_dell_message | default('') | lower)
      }}
    idrac_update_submit_error_is_transient: >-
      {{
        'jsondecodeerror' in idrac_update_submit_error_text
        or 'no start of json char' in idrac_update_submit_error_text
        or 'expecting value' in idrac_update_submit_error_text
        or 'empty response' in idrac_update_submit_error_text
        or 'http 503' in idrac_update_submit_error_text
        or '503' in idrac_update_submit_error_text
        or 'connection reset' in idrac_update_submit_error_text
        or 'connection refused' in idrac_update_submit_error_text
        or 'timed out' in idrac_update_submit_error_text
        or 'timeout' in idrac_update_submit_error_text
      }}
  when:
    - idrac_update_firmware_submit_result is defined
    - idrac_update_firmware_submit_result.skipped is not defined

- name: Apply item | Store firmware submission classification
  ansible.builtin.set_fact:
    idrac_update_firmware_item_submission_classification: >-
      {{
        'submitted'
        if idrac_update_firmware_submit_result is succeeded
        else (
          'lifecycle_controller_busy'
          if idrac_update_submit_error_is_red023 | bool
          else (
            'redfish_temporarily_unavailable'
            if idrac_update_submit_error_is_transient | bool
            else 'firmware_submission_failed'
          )
        )
      }}
    idrac_update_firmware_item_retryable: >-
      {{
        idrac_update_submit_error_is_red023 | bool
        or idrac_update_submit_error_is_transient | bool
      }}
    idrac_update_firmware_item_wait_reason: >-
      {{
        'waiting_for_lifecycle_controller'
        if idrac_update_submit_error_is_red023 | bool
        else (
          'waiting_for_redfish_recovery'
          if idrac_update_submit_error_is_transient | bool
          else ''
        )
      }}
  when:
    - idrac_update_firmware_submit_result is defined
    - idrac_update_firmware_submit_result.skipped is not defined

- name: Apply item | Fail on non-retryable firmware submission errors
  ansible.builtin.fail:
    msg: >-
      Firmware submission failed for {{ firmware_item.name }} on {{ inventory_hostname }}.
      Job={{ idrac_update_firmware_item_job_id | default('UNKNOWN') }}
      Message ID={{ idrac_update_firmware_item_dell_message_id | default('UNKNOWN') }}
      Message={{ idrac_update_firmware_item_dell_message | default(idrac_update_firmware_submit_result.msg | default('unknown error')) }}.
  when:
    - idrac_update_firmware_submit_result is defined
    - idrac_update_firmware_submit_result is failed
    - not idrac_update_firmware_item_retryable | default(false) | bool
