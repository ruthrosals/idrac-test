---
- name: Apply mode | Report firmware components selected for install
  ansible.builtin.debug:
    msg: >-
      APPLY PLAN: {{ inventory_hostname }} component={{ item.name }}
      current={{ item.current_version }}
      target={{ item.target_version }}
      expected_installed={{ item.expected_installed_version }}
      approved={{ item.approved }}
      excluded={{ item.excluded }}
      applicability={{ item.applicability }}
      action={{ item.action }}
      allow_downgrade={{ item.allow_downgrade }}
      drift={{ item.drift }}
      should_install={{ item.should_install }}
      image_uri_status={{ item.image_uri_status }}
      image_uri_reachable={{ item.image_uri_reachable }}
      deployment_ready={{ item.deployment_ready }}
      readiness_reason={{ item.readiness_reason }}
  loop: "{{ idrac_update_install_plan }}"
  loop_control:
    label: "{{ item.name }}"
  when: idrac_update_mode == 'apply'

- name: Apply mode | Determine expected iDRAC final version
  ansible.builtin.set_fact:
    idrac_update_idrac_expected_version: "{{ item.expected_installed_version }}"
    idrac_update_idrac_update_expected: true
  loop: "{{ idrac_update_install_plan }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - idrac_update_mode == 'apply'
    - item.handler_restart_redfish | bool
    - item.should_install | bool

- name: Apply mode | Build ordered firmware execution plan
  ansible.builtin.set_fact:
    idrac_update_ordered_install_plan: >-
      {{
        idrac_update_install_plan
        | selectattr('should_install', 'equalto', true)
        | sort(attribute='handler_execution_order')
        | list
      }}
  when: idrac_update_mode == 'apply'

- name: Apply mode | Show effective firmware execution order
  ansible.builtin.debug:
    msg:
      heading: "Effective firmware execution order"
      execution_order: "{{ idrac_update_ordered_install_plan | map(attribute='normalized_name') | list }}"
  when: idrac_update_mode == 'apply'

- name: Apply mode | Apply firmware items sequentially
  ansible.builtin.include_tasks: apply_item.yml
  loop: "{{ idrac_update_ordered_install_plan | default([]) }}"
  loop_control:
    loop_var: firmware_item
    label: "{{ firmware_item.name }}"
  when: idrac_update_mode == 'apply'

- name: Apply mode | Build skipped install result entries
  ansible.builtin.set_fact:
    idrac_update_install_results: "{{ idrac_update_install_results + [idrac_update_install_result_item] }}"
  loop: "{{ idrac_update_install_plan }}"
  loop_control:
    label: "{{ item.name }}"
  vars:
    idrac_update_install_result_item:
      host: "{{ inventory_hostname }}"
      component: "{{ item.normalized_name }}"
      name: "{{ item.name }}"
      normalized_name: "{{ item.normalized_name }}"
      handler_comparator: "{{ item.handler_comparator }}"
      handler_installer: "{{ item.handler_installer }}"
      handler_restart_redfish: "{{ item.handler_restart_redfish }}"
      handler_execution_order: "{{ item.handler_execution_order }}"
      inventory_source: "{{ item.inventory_source }}"
      firmware_image_uri: "{{ item.firmware_image_uri }}"
      image_uri_reachable: "{{ item.image_uri_reachable }}"
      image_uri_status: "{{ item.image_uri_status }}"
      deployment_ready: "{{ item.deployment_ready }}"
      readiness_reason: "{{ item.readiness_reason }}"
      submitted: false
      job_id: ""
      module_changed: false
      before_version: "{{ item.current_version }}"
      expected_installed_version: "{{ item.expected_installed_version }}"
      expected_version: "{{ item.expected_installed_version }}"
      final_version: "{{ item.current_version }}"
      redfish_recovered: false
      verification_passed: false
      attempts: 0
      status: "{{ item.action }}"
      error: "{{ item.skip_reason }}"
      action: "{{ item.action }}"
      applicability: "{{ item.applicability }}"
      allow_downgrade: "{{ item.allow_downgrade }}"
      redfish_task_id: ""
      changed: false
      skipped: true
      reason: "{{ item.skip_reason }}"
  when:
    - idrac_update_mode == 'apply'
    - not item.should_install | bool

- name: Apply mode | Report skipped firmware components
  ansible.builtin.debug:
    msg: >-
      SKIPPED: {{ inventory_hostname }} component={{ item.name }}
      current={{ item.current_version }}
      target={{ item.target_version }}
      expected_installed={{ item.expected_installed_version }}
      reason={{ item.skip_reason }}
  loop: "{{ idrac_update_install_plan }}"
  when:
    - idrac_update_mode == 'apply'
    - not item.should_install | bool
