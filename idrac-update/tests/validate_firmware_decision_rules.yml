---
- name: Validate iDRAC update firmware decision rules
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../roles/idrac_update/defaults/main.yml
  vars:
    expected_execution_order:
      - uefi_diagnostics
      - os_driver_pack
      - idrac_lifecycle_controller
    normalization_cases:
      - input: iDRAC
        expected: idrac_lifecycle_controller
      - input: Integrated Dell Remote Access Controller
        expected: idrac_lifecycle_controller
      - input: Lifecycle Controller
        expected: idrac_lifecycle_controller
      - input: iDRAC with Lifecycle Controller
        expected: idrac_lifecycle_controller
      - input: idrac_lifecycle_controller
        expected: idrac_lifecycle_controller
      - input: UEFI Diagnostics
        expected: uefi_diagnostics
      - input: Dell 64 Bit UEFI Diagnostics
        expected: uefi_diagnostics
      - input: 64 Bit UEFI Diagnostics
        expected: uefi_diagnostics
      - input: OS Driver Pack
        expected: os_driver_pack
      - input: Dell OS Driver Pack
        expected: os_driver_pack
      - input: Drivers for OS Deployment
        expected: os_driver_pack
    decision_cases:
      - name: idrac_upgrade
        component: idrac_lifecycle_controller
        current_version: 7.00.00.182
        expected_installed_version: 7.00.00.184
        component_present: true
        allow_downgrade: false
        force_update: false
        expected_relation: older
        expected_action: upgrade_required
        expected_should_install: true
      - name: idrac_compliant
        component: idrac_lifecycle_controller
        current_version: 7.00.00.184
        expected_installed_version: 7.00.00.184
        component_present: true
        allow_downgrade: false
        force_update: false
        expected_relation: equal
        expected_action: compliant
        expected_should_install: false
      - name: idrac_newer_without_downgrade
        component: idrac_lifecycle_controller
        current_version: 7.00.00.184
        expected_installed_version: 7.00.00.182
        component_present: true
        allow_downgrade: false
        force_update: false
        expected_relation: newer
        expected_action: newer_than_target
        expected_should_install: false
      - name: idrac_newer_with_downgrade
        component: idrac_lifecycle_controller
        current_version: 7.00.00.184
        expected_installed_version: 7.00.00.182
        component_present: true
        allow_downgrade: true
        force_update: false
        expected_relation: newer
        expected_action: downgrade_required
        expected_should_install: true
      - name: uefi_diagnostics_upgrade_a70_to_a73
        component: uefi_diagnostics
        current_version: 4301A70
        target_version: 4301.74
        expected_installed_version: 4301A73
        component_present: true
        allow_downgrade: false
        force_update: false
        expected_relation: older
        expected_action: upgrade_required
        expected_should_install: true
      - name: uefi_diagnostics_upgrade_a71_to_a73
        component: uefi_diagnostics
        current_version: 4301A71
        target_version: 4301.74
        expected_installed_version: 4301A73
        component_present: true
        allow_downgrade: false
        force_update: false
        expected_relation: older
        expected_action: upgrade_required
        expected_should_install: true
      - name: uefi_diagnostics_future_a73_to_a74
        component: uefi_diagnostics
        current_version: 4301A73
        expected_installed_version: 4301A74
        component_present: true
        allow_downgrade: false
        force_update: false
        expected_relation: older
        expected_action: upgrade_required
        expected_should_install: true
      - name: uefi_diagnostics_future_a99_to_4302a01
        component: uefi_diagnostics
        current_version: 4301A99
        expected_installed_version: 4302A01
        component_present: true
        allow_downgrade: false
        force_update: false
        expected_relation: older
        expected_action: upgrade_required
        expected_should_install: true
      - name: uefi_diagnostics_compliant
        component: uefi_diagnostics
        current_version: 4301A73
        target_version: 4301.74
        expected_installed_version: 4301A73
        component_present: true
        allow_downgrade: false
        force_update: false
        expected_relation: equal
        expected_action: compliant
        expected_should_install: false
      - name: uefi_diagnostics_newer_a74_to_a73
        component: uefi_diagnostics
        current_version: 4301A74
        target_version: 4301.74
        expected_installed_version: 4301A73
        component_present: true
        allow_downgrade: false
        force_update: false
        expected_relation: newer
        expected_action: newer_than_target
        expected_should_install: false
      - name: os_driver_pack_upgrade_from_191205
        component: os_driver_pack
        current_version: 19.12.05
        expected_installed_version: 24.01.04
        component_present: true
        allow_downgrade: false
        force_update: false
        expected_relation: older
        expected_action: upgrade_required
        expected_should_install: true
      - name: os_driver_pack_upgrade_from_211001
        component: os_driver_pack
        current_version: 21.10.01
        expected_installed_version: 24.01.04
        component_present: true
        allow_downgrade: false
        force_update: false
        expected_relation: older
        expected_action: upgrade_required
        expected_should_install: true
      - name: future_dotted_numeric_upgrade
        component: os_driver_pack
        current_version: 24.01.04
        expected_installed_version: 25.02.01
        component_present: true
        allow_downgrade: false
        force_update: false
        expected_relation: older
        expected_action: upgrade_required
        expected_should_install: true
      - name: unknown_unparseable_version
        component: idrac_lifecycle_controller
        current_version: custom-build
        expected_installed_version: 7.00.00.184
        component_present: true
        allow_downgrade: false
        force_update: false
        expected_relation: unknown
        expected_action: version_mismatch
        expected_should_install: false
  tasks:
    - name: Initialize registry alias map
      ansible.builtin.set_fact:
        component_alias_map: {}
        component_alias_entries: []

    - name: Build registry alias map
      ansible.builtin.set_fact:
        component_alias_entries: >-
          {{ component_alias_entries + [{'alias': alias_key, 'component': item.0.key}] }}
        component_alias_map: "{{ component_alias_map | combine({alias_key: item.0.key}) }}"
      loop: "{{ idrac_update_component_handlers | dict2items | subelements('value.aliases') }}"
      loop_control:
        label: "{{ item.0.key }} <= {{ item.1 }}"
      vars:
        alias_key: >-
          {{
            item.1
            | lower
            | trim
            | regex_replace('[^a-z0-9]+', '_')
            | regex_replace('_+', '_')
            | regex_replace('^_+|_+$', '')
          }}

    - name: Validate registry aliases are unambiguous
      ansible.builtin.assert:
        that:
          - alias_components | length == 1
      loop: "{{ component_alias_entries | map(attribute='alias') | unique | list }}"
      loop_control:
        label: "{{ item }}"
      vars:
        alias_components: >-
          {{
            component_alias_entries
            | selectattr('alias', 'equalto', item)
            | map(attribute='component')
            | unique
            | list
          }}

    - name: Validate supported aliases resolve through registry
      ansible.builtin.assert:
        that:
          - component_alias_map[alias_key] == item.expected
        fail_msg: >-
          Registry normalization failed for {{ item.input }}.
          Expected={{ item.expected }}, actual={{ component_alias_map[alias_key] | default('unsupported') }}.
      loop: "{{ normalization_cases }}"
      loop_control:
        label: "{{ item.input }}"
      vars:
        alias_key: >-
          {{
            item.input
            | lower
            | trim
            | regex_replace('[^a-z0-9]+', '_')
            | regex_replace('_+', '_')
            | regex_replace('^_+|_+$', '')
          }}

    - name: Validate unsupported aliases are rejected by registry
      ansible.builtin.assert:
        that:
          - unsupported_alias_key not in component_alias_map
        fail_msg: "Unsupported alias unexpectedly resolved through registry."
      vars:
        unsupported_alias_key: bios

    - name: Validate approved components exist in registry
      ansible.builtin.assert:
        that:
          - approved_key in component_alias_map
        fail_msg: "Approved component {{ item }} is not supported by the registry."
      loop: "{{ idrac_update_approved_components }}"
      vars:
        approved_key: >-
          {{
            item
            | lower
            | trim
            | regex_replace('[^a-z0-9]+', '_')
            | regex_replace('_+', '_')
            | regex_replace('^_+|_+$', '')
          }}

    - name: Validate handler behavior metadata
      ansible.builtin.assert:
        that:
          - idrac_update_component_handlers.idrac_lifecycle_controller.restart_redfish | bool
          - not idrac_update_component_handlers.uefi_diagnostics.restart_redfish | bool
          - not idrac_update_component_handlers.os_driver_pack.restart_redfish | bool
          - idrac_update_component_handlers.idrac_lifecycle_controller.installer == 'redfish'
          - idrac_update_component_handlers.uefi_diagnostics.installer == 'redfish'
          - idrac_update_component_handlers.os_driver_pack.installer == 'redfish'
          - idrac_update_component_handlers.idrac_lifecycle_controller.comparator == 'dotted_numeric'
          - idrac_update_component_handlers.uefi_diagnostics.comparator == 'uefi_revision'
          - idrac_update_component_handlers.os_driver_pack.comparator == 'dotted_numeric'

    - name: Validate unknown handler values fail support checks
      ansible.builtin.assert:
        that:
          - unknown_comparator not in ['dotted_numeric', 'uefi_revision']
          - unknown_installer != 'redfish'
      vars:
        unknown_comparator: made_up_comparator
        unknown_installer: made_up_installer

    - name: Validate duplicate canonical component rejection rule
      ansible.builtin.assert:
        that:
          - requested_components | length != requested_components | unique | length
        fail_msg: "Duplicate canonical component rejection rule failed."
      vars:
        requested_components:
          - uefi_diagnostics
          - uefi_diagnostics

    - name: Validate disallowed component rejection rule
      ansible.builtin.assert:
        that:
          - bios_disallowed | bool
          - perc_disallowed | bool
          - nic_disallowed | bool
          - disk_disallowed | bool
          - cpld_disallowed | bool
        fail_msg: "Disallowed component rejection rule failed."
      vars:
        bios_disallowed: "{{ 'bios' in idrac_update_disallowed_components }}"
        perc_disallowed: "{{ 'perc' in idrac_update_disallowed_components }}"
        nic_disallowed: "{{ 'nic' in idrac_update_disallowed_components }}"
        disk_disallowed: "{{ 'disk_firmware' in idrac_update_disallowed_components }}"
        cpld_disallowed: "{{ 'cpld' in idrac_update_disallowed_components }}"

    - name: Validate firmware decision cases
      ansible.builtin.assert:
        that:
          - version_relation | trim == item.expected_relation
          - firmware_action | trim == item.expected_action
          - should_install | bool == item.expected_should_install
        fail_msg: >-
          Decision rule failed for {{ item.name }}.
          Expected relation={{ item.expected_relation }}, actual relation={{ version_relation | trim }}.
          Expected action={{ item.expected_action }}, actual action={{ firmware_action | trim }}.
          Expected should_install={{ item.expected_should_install }}, actual should_install={{ should_install }}.
      loop: "{{ decision_cases }}"
      loop_control:
        label: "{{ item.name }}"
      vars:
        component: "{{ item.component }}"
        handler: "{{ idrac_update_component_handlers[component] }}"
        current_version: "{{ item.current_version }}"
        expected_version: "{{ item.expected_installed_version }}"
        approved: "{{ component in idrac_update_approved_components }}"
        excluded: "{{ component in idrac_update_disallowed_components }}"
        current_numeric_supported: >-
          {{
            handler.comparator == 'dotted_numeric'
            and current_version is match('^[0-9]+(\.[0-9]+)+$')
          }}
        expected_numeric_supported: >-
          {{
            handler.comparator == 'dotted_numeric'
            and expected_version is match('^[0-9]+(\.[0-9]+)+$')
          }}
        current_uefi_supported: >-
          {{
            handler.comparator == 'uefi_revision'
            and current_version is match('^[0-9]+[A-Za-z][0-9]+$')
          }}
        expected_uefi_supported: >-
          {{
            handler.comparator == 'uefi_revision'
            and expected_version is match('^[0-9]+[A-Za-z][0-9]+$')
          }}
        version_comparison_supported: >-
          {{
            (current_numeric_supported | string | lower == 'true' and expected_numeric_supported | string | lower == 'true')
            or (current_uefi_supported | string | lower == 'true' and expected_uefi_supported | string | lower == 'true')
          }}
        current_numeric_parts: >-
          {{ current_version.split('.') | map('int') | list if current_numeric_supported | string | lower == 'true' else [] }}
        expected_numeric_parts: >-
          {{ expected_version.split('.') | map('int') | list if expected_numeric_supported | string | lower == 'true' else [] }}
        current_uefi_parts: >-
          {{
            [
              current_version | regex_replace('[A-Za-z].*$', '') | int,
              current_version | regex_replace('^[0-9]+[A-Za-z]', '') | int
            ]
            if current_uefi_supported | string | lower == 'true'
            else []
          }}
        expected_uefi_parts: >-
          {{
            [
              expected_version | regex_replace('[A-Za-z].*$', '') | int,
              expected_version | regex_replace('^[0-9]+[A-Za-z]', '') | int
            ]
            if expected_uefi_supported | string | lower == 'true'
            else []
          }}
        comparison_current_parts: >-
          {{ current_uefi_parts if handler.comparator == 'uefi_revision' else current_numeric_parts }}
        comparison_expected_parts: >-
          {{ expected_uefi_parts if handler.comparator == 'uefi_revision' else expected_numeric_parts }}
        version_relation: >-
          {% if current_version == expected_version %}equal
          {% elif not item.component_present | bool or current_version == 'UNKNOWN' %}unknown
          {% elif (version_comparison_supported | string | lower) != 'true' %}unknown
          {% elif comparison_current_parts < comparison_expected_parts %}older
          {% elif comparison_current_parts > comparison_expected_parts %}newer
          {% else %}equal
          {% endif %}
        firmware_action: >-
          {% if component in idrac_update_disallowed_components %}excluded
          {% elif component not in idrac_update_approved_components %}excluded
          {% elif not item.component_present | bool %}not_applicable
          {% elif item.force_update | bool %}forced_update
          {% elif current_version == 'UNKNOWN' %}unknown
          {% elif (version_relation | trim) == 'equal' %}compliant
          {% elif (version_relation | trim) == 'older' %}upgrade_required
          {% elif (version_relation | trim) == 'newer' and item.allow_downgrade | bool %}downgrade_required
          {% elif (version_relation | trim) == 'newer' %}newer_than_target
          {% else %}version_mismatch
          {% endif %}
        should_install: >-
          {{
            component in idrac_update_approved_components
            and component not in idrac_update_disallowed_components
            and item.component_present | bool
            and (
              (
                item.force_update | bool
                and item.component_present | bool
              )
              or (
                current_version != 'UNKNOWN'
                and (version_relation | trim) == 'older'
              )
              or (
                current_version != 'UNKNOWN'
                and (version_relation | trim) == 'newer'
                and item.allow_downgrade | bool
              )
            )
          }}

    - name: Validate firmware execution ordering
      ansible.builtin.assert:
        that:
          - actual_execution_order == expected_execution_order
          - actual_execution_order[-1] == 'idrac_lifecycle_controller'
        fail_msg: >-
          Firmware execution order failed.
          Expected={{ expected_execution_order }}, actual={{ actual_execution_order }}.
      vars:
        ordered_items: >-
          {{
            idrac_update_component_handlers
            | dict2items
            | sort(attribute='value.execution_order')
            | map(attribute='key')
            | list
          }}
        actual_execution_order: "{{ ordered_items }}"
    - name: Validate check-mode reporting semantics
      ansible.builtin.assert:
        that:
          - check_mode_verification_status == 'not_run_check_mode'
          - check_mode_verification_passed | string == ''
          - check_mode_action == 'upgrade_required'
        fail_msg: Check-mode report semantics should preserve compliance action without verification failure.
      vars:
        idrac_update_mode: check
        compliance_action: upgrade_required
        check_mode_verification_status: >-
          {% if idrac_update_mode == 'check' %}not_run_check_mode{% else %}passed{% endif %}
        check_mode_verification_passed: "{{ none if idrac_update_mode == 'check' else true }}"
        check_mode_action: >-
          {% if idrac_update_mode == 'check' %}{{ compliance_action }}{% else %}installed{% endif %}
