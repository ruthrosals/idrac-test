---
- name: Validate iDRAC update firmware decision rules
  hosts: localhost
  gather_facts: false
  vars:
    idrac_update_approved_component_set:
      - idrac_lifecycle_controller
      - uefi_diagnostics
      - os_driver_pack
    idrac_update_disallowed_component_set:
      - bios
      - perc
      - nic
      - disk_firmware
      - cpld
    normalization_cases:
      - input: iDRAC
        expected: idrac_lifecycle_controller
      - input: Integrated Dell Remote Access Controller
        expected: idrac_lifecycle_controller
      - input: Lifecycle Controller
        expected: idrac_lifecycle_controller
      - input: iDRAC with Lifecycle Controller
        expected: idrac_lifecycle_controller
      - input: idrac_lifecycle_controller
        expected: idrac_lifecycle_controller
      - input: UEFI Diagnostics
        expected: uefi_diagnostics
      - input: Dell 64 Bit UEFI Diagnostics
        expected: uefi_diagnostics
      - input: 64 Bit UEFI Diagnostics
        expected: uefi_diagnostics
      - input: OS Driver Pack
        expected: os_driver_pack
      - input: Dell OS Driver Pack
        expected: os_driver_pack
      - input: Drivers for OS Deployment
        expected: os_driver_pack
      - input: BIOS
        expected: bios
    idrac_update_component_order:
      - uefi_diagnostics
      - os_driver_pack
      - idrac_lifecycle_controller
    sequencing_input:
      - normalized_name: idrac_lifecycle_controller
        should_install: true
      - normalized_name: os_driver_pack
        should_install: true
      - normalized_name: uefi_diagnostics
        should_install: true
    expected_execution_order:
      - uefi_diagnostics
      - os_driver_pack
      - idrac_lifecycle_controller
    decision_cases:
      - name: idrac_upgrade
        component: idrac_lifecycle_controller
        current_version: 7.00.00.182
        expected_installed_version: 7.00.00.184
        component_present: true
        allow_downgrade: false
        force_update: false
        expected_relation: older
        expected_action: upgrade_required
        expected_should_install: true
      - name: idrac_compliant
        component: idrac_lifecycle_controller
        current_version: 7.00.00.184
        expected_installed_version: 7.00.00.184
        component_present: true
        allow_downgrade: false
        force_update: false
        expected_relation: equal
        expected_action: compliant
        expected_should_install: false
      - name: idrac_newer_without_downgrade
        component: idrac_lifecycle_controller
        current_version: 7.00.00.184
        expected_installed_version: 7.00.00.182
        component_present: true
        allow_downgrade: false
        force_update: false
        expected_relation: newer
        expected_action: newer_than_target
        expected_should_install: false
      - name: idrac_newer_with_downgrade
        component: idrac_lifecycle_controller
        current_version: 7.00.00.184
        expected_installed_version: 7.00.00.182
        component_present: true
        allow_downgrade: true
        force_update: false
        expected_relation: newer
        expected_action: downgrade_required
        expected_should_install: true
      - name: uefi_diagnostics_upgrade_a70_to_a73
        component: uefi_diagnostics
        current_version: 4301A70
        target_version: 4301.74
        expected_installed_version: 4301A73
        component_present: true
        allow_downgrade: false
        force_update: false
        expected_relation: older
        expected_action: upgrade_required
        expected_should_install: true
      - name: uefi_diagnostics_upgrade_a71_to_a73
        component: uefi_diagnostics
        current_version: 4301A71
        target_version: 4301.74
        expected_installed_version: 4301A73
        component_present: true
        allow_downgrade: false
        force_update: false
        expected_relation: older
        expected_action: upgrade_required
        expected_should_install: true
      - name: uefi_diagnostics_compliant
        component: uefi_diagnostics
        current_version: 4301A73
        target_version: 4301.74
        expected_installed_version: 4301A73
        component_present: true
        allow_downgrade: false
        force_update: false
        expected_relation: equal
        expected_action: compliant
        expected_should_install: false
      - name: uefi_diagnostics_newer_a74_to_a73
        component: uefi_diagnostics
        current_version: 4301A74
        target_version: 4301.74
        expected_installed_version: 4301A73
        component_present: true
        allow_downgrade: false
        force_update: false
        expected_relation: newer
        expected_action: newer_than_target
        expected_should_install: false
      - name: os_driver_pack_upgrade_from_191205
        component: os_driver_pack
        current_version: 19.12.05
        expected_installed_version: 24.01.04
        component_present: true
        allow_downgrade: false
        force_update: false
        expected_relation: older
        expected_action: upgrade_required
        expected_should_install: true
      - name: os_driver_pack_upgrade_from_211001
        component: os_driver_pack
        current_version: 21.10.01
        expected_installed_version: 24.01.04
        component_present: true
        allow_downgrade: false
        force_update: false
        expected_relation: older
        expected_action: upgrade_required
        expected_should_install: true
      - name: unknown_unparseable_version
        component: idrac_lifecycle_controller
        current_version: custom-build
        expected_installed_version: 7.00.00.184
        component_present: true
        allow_downgrade: false
        force_update: false
        expected_relation: unknown
        expected_action: version_mismatch
        expected_should_install: false
  tasks:
    - name: Validate canonical component normalization cases
      ansible.builtin.assert:
        that:
          - actual | trim == item.expected
        fail_msg: >-
          Normalization failed for {{ item.input }}.
          Expected={{ item.expected }}, actual={{ actual }}.
      loop: "{{ normalization_cases }}"
      loop_control:
        label: "{{ item.input }}"
      vars:
        key: >-
          {{
            item.input
            | lower
            | trim
            | regex_replace('[^a-z0-9]+', '_')
            | regex_replace('_+', '_')
            | regex_replace('^_+|_+$', '')
          }}
        actual: >-
          {{
            'idrac_lifecycle_controller'
            if key in [
              'idrac',
              'integrated_dell_remote_access_controller',
              'lifecycle_controller',
              'idrac_with_lifecycle_controller',
              'idrac_lifecycle_controller'
            ]
            else 'uefi_diagnostics'
            if key in [
              'diagnostics',
              'uefi_diagnostics',
              'dell_64_bit_uefi_diagnostics',
              '64_bit_uefi_diagnostics'
            ]
            else 'os_driver_pack'
            if key in [
              'os_driver_pack',
              'dell_os_driver_pack',
              'drivers_for_os_deployment'
            ]
            else 'disk_firmware'
            if 'disk' in key
            else 'cpld'
            if key == 'cpld' or key == 'system_cpld'
            else 'perc'
            if 'perc' in key
            else 'nic'
            if key == 'nic' or 'ethernet' in key or 'network' in key
            else key
          }}

    - name: Validate duplicate canonical component rejection rule
      ansible.builtin.assert:
        that:
          - requested_components | length != requested_components | unique | length
        fail_msg: "Duplicate canonical component rejection rule failed."
      vars:
        requested_components:
          - uefi_diagnostics
          - uefi_diagnostics

    - name: Validate disallowed component rejection rule
      ansible.builtin.assert:
        that:
          - bios_disallowed | bool
          - perc_disallowed | bool
          - nic_disallowed | bool
          - disk_disallowed | bool
          - cpld_disallowed | bool
        fail_msg: "Disallowed component rejection rule failed."
      vars:
        bios_disallowed: "{{ 'bios' in idrac_update_disallowed_component_set }}"
        perc_disallowed: "{{ 'perc' in idrac_update_disallowed_component_set }}"
        nic_disallowed: "{{ 'nic' in idrac_update_disallowed_component_set }}"
        disk_disallowed: "{{ 'disk_firmware' in idrac_update_disallowed_component_set }}"
        cpld_disallowed: "{{ 'cpld' in idrac_update_disallowed_component_set }}"

    - name: Validate firmware decision cases
      ansible.builtin.assert:
        that:
          - version_relation | trim == item.expected_relation
          - firmware_action | trim == item.expected_action
          - should_install | bool == item.expected_should_install
        fail_msg: >-
          Decision rule failed for {{ item.name }}.
          Expected relation={{ item.expected_relation }}, actual relation={{ version_relation | trim }}.
          Expected action={{ item.expected_action }}, actual action={{ firmware_action | trim }}.
          Expected should_install={{ item.expected_should_install }}, actual should_install={{ should_install }}.
      loop: "{{ decision_cases }}"
      loop_control:
        label: "{{ item.name }}"
      vars:
        component: "{{ item.component }}"
        current_version: "{{ item.current_version }}"
        expected_version: "{{ item.expected_installed_version }}"
        approved: "{{ component in idrac_update_approved_component_set }}"
        excluded: "{{ component in idrac_update_disallowed_component_set }}"
        current_numeric_supported: >-
          {{
            component in ['idrac_lifecycle_controller', 'os_driver_pack']
            and current_version is match('^[0-9]+(\.[0-9]+)+$')
          }}
        expected_numeric_supported: >-
          {{
            component in ['idrac_lifecycle_controller', 'os_driver_pack']
            and expected_version is match('^[0-9]+(\.[0-9]+)+$')
          }}
        current_uefi_supported: >-
          {{
            component == 'uefi_diagnostics'
            and current_version is match('^[0-9]+[A-Za-z][0-9]+$')
          }}
        expected_uefi_supported: >-
          {{
            component == 'uefi_diagnostics'
            and expected_version is match('^[0-9]+[A-Za-z][0-9]+$')
          }}
        version_comparison_supported: >-
          {{
            (current_numeric_supported | string | lower == 'true' and expected_numeric_supported | string | lower == 'true')
            or (current_uefi_supported | string | lower == 'true' and expected_uefi_supported | string | lower == 'true')
          }}
        current_numeric_parts: >-
          {{ current_version.split('.') | map('int') | list if current_numeric_supported | string | lower == 'true' else [] }}
        expected_numeric_parts: >-
          {{ expected_version.split('.') | map('int') | list if expected_numeric_supported | string | lower == 'true' else [] }}
        current_uefi_parts: >-
          {{
            [
              current_version | regex_replace('[A-Za-z].*$', '') | int,
              current_version | regex_replace('^[0-9]+[A-Za-z]', '') | int
            ]
            if current_uefi_supported | string | lower == 'true'
            else []
          }}
        expected_uefi_parts: >-
          {{
            [
              expected_version | regex_replace('[A-Za-z].*$', '') | int,
              expected_version | regex_replace('^[0-9]+[A-Za-z]', '') | int
            ]
            if expected_uefi_supported | string | lower == 'true'
            else []
          }}
        comparison_current_parts: >-
          {{ current_uefi_parts if component == 'uefi_diagnostics' else current_numeric_parts }}
        comparison_expected_parts: >-
          {{ expected_uefi_parts if component == 'uefi_diagnostics' else expected_numeric_parts }}
        version_relation: >-
          {% if current_version == expected_version %}equal
          {% elif not item.component_present | bool or current_version == 'UNKNOWN' %}unknown
          {% elif (version_comparison_supported | string | lower) != 'true' %}unknown
          {% elif comparison_current_parts < comparison_expected_parts %}older
          {% elif comparison_current_parts > comparison_expected_parts %}newer
          {% else %}equal
          {% endif %}
        firmware_action: >-
          {% if component in idrac_update_disallowed_component_set %}excluded
          {% elif component not in idrac_update_approved_component_set %}excluded
          {% elif not item.component_present | bool %}not_applicable
          {% elif item.force_update | bool %}forced_update
          {% elif current_version == 'UNKNOWN' %}unknown
          {% elif (version_relation | trim) == 'equal' %}compliant
          {% elif (version_relation | trim) == 'older' %}upgrade_required
          {% elif (version_relation | trim) == 'newer' and item.allow_downgrade | bool %}downgrade_required
          {% elif (version_relation | trim) == 'newer' %}newer_than_target
          {% else %}version_mismatch
          {% endif %}
        should_install: >-
          {{
            component in idrac_update_approved_component_set
            and component not in idrac_update_disallowed_component_set
            and item.component_present | bool
            and (
              (
                item.force_update | bool
                and item.component_present | bool
              )
              or (
                current_version != 'UNKNOWN'
                and (version_relation | trim) == 'older'
              )
              or (
                current_version != 'UNKNOWN'
                and (version_relation | trim) == 'newer'
                and item.allow_downgrade | bool
              )
            )
          }}


    - name: Validate firmware execution ordering
      ansible.builtin.assert:
        that:
          - actual_execution_order == expected_execution_order
          - actual_execution_order[-1] == 'idrac_lifecycle_controller'
        fail_msg: >-
          Firmware execution order failed.
          Expected={{ expected_execution_order }}, actual={{ actual_execution_order }}.
      vars:
        ordered_items: >-
          {{
            (sequencing_input | selectattr('normalized_name', 'equalto', 'uefi_diagnostics') | list)
            + (sequencing_input | selectattr('normalized_name', 'equalto', 'os_driver_pack') | list)
            + (sequencing_input | selectattr('normalized_name', 'equalto', 'idrac_lifecycle_controller') | list)
          }}
        actual_execution_order: "{{ ordered_items | map(attribute='normalized_name') | list }}"
